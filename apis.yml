  - type: Channels
    data:
      - name: Retail Investor Portal
        description: Self-directed investor portal at investor.vanguard.com for accounts, trading, statements, and tax forms.
      - name: Advisor Portal
        description: Vanguard Financial Advisor Services (FAS) portal at advisors.vanguard.com — authenticated access to fund data, research, and trading for RIAs and broker-dealer-affiliated advisors.
      - name: Institutional Portal
        description: institutional.vanguard.com for retirement plan sponsors and institutional asset-management clients (DC recordkeeping, plan administration, asset-management mandates).
      - name: Wealth Distribution Platforms
        description: Vanguard mutual funds and ETFs are distributed industry-wide through brokerage, custodian, and retirement-plan platforms (Schwab, Fidelity, Pershing, etc.) using standard fund-trading rails (NSCC Fund/SERV, DTCC).
      - name: Mobile Apps
        description: Vanguard mobile app for retail account management and trading (iOS and Android).
  - type: Features
    data:
      - name: Quarterly Holdings and Annual Reports
        description: Fund-level reports (annual, semi-annual, summary prospectus, statement of additional information) published through the corporate site and SEC EDGAR.
      - name: SEC EDGAR Filings
        description: 13F-HR, N-PORT, N-CSR, N-CEN, N-PX, prospectuses, and other regulatory filings available via SEC EDGAR.
      - name: Press Releases and Newsroom
        description: News, press releases, and corporate communications published on the corporate site; no public RSS feed observed.
      - name: Research and Commentary
        description: Vanguard Research Center publishes whitepapers on indexing, advice, retirement, and capital-market forecasts (Vanguard Capital Markets Model, VCMM).
      - name: Personal Advisor Tools
        description: Authenticated retirement and goals planning tools for Personal Advisor clients (digital, hybrid, and wealth-management tiers).
  - type: PeerProviders
    data:
      - name: BlackRock / iShares
        description: Largest global asset manager and #1 ETF provider; primary competitor to Vanguard in index / ETF and institutional asset management.
      - name: State Street Global Advisors (SPDR)
        description: Third-largest ETF provider and major institutional asset manager.
      - name: Fidelity Investments
        description: Mutual-fund and brokerage competitor (also a Vanguard recordkeeping rival in DC plans).
      - name: Charles Schwab
        description: Brokerage, advisor custodian, and low-cost index/ETF competitor.
      - name: J.P. Morgan Asset Management, Invesco, T. Rowe Price, Capital Group
        description: Mutual-fund and ETF competitors across active and index strategies.
  - type: Absences
    data:
      - name: No Public Developer API
        description: Vanguard does not publish a public REST/GraphQL/OpenAPI developer API for retail investors, advisors, recordkeeping participants, or institutional clients. All programmatic interaction runs through authentication-gated portals or industry rails (NSCC/DTCC, Fund/SERV).
      - name: No Public Developer Portal
        description: There is no developer.vanguard.com / developers.vanguard.com / api.vanguard.com surface. The investor and advisor portals are end-user UIs, not developer-facing API consoles.
      - name: No Public OpenAPI / AsyncAPI Specs
        description: No OpenAPI 3.x or AsyncAPI specifications are published by Vanguard for any of its retail, advisor, institutional, or recordkeeping surfaces.
      - name: No Public SDKs or CLI
        description: Vanguard publishes no language SDKs (no JavaScript, Python, Java, .NET, Go, or other client libraries) and no command-line interface.
      - name: No Public Webhooks or Event Bus
        description: All investor, advisor, and plan-participant notifications are delivered via email or in-portal messaging; there is no documented webhook / push-API or public event bus.
      - name: No Public RSS or Atom Feeds
        description: Newsroom, research, and insights pages are HTML / PDF only; no `feed.xml` or Atom feed was discovered on the corporate or investor sites.
      - name: No Public GitHub Engineering Surface
        description: A `github.com/Vanguard-Group` organization was created on 2026-03-25 but currently exposes zero public repositories and zero public members. No public OpenAPI specs, SDKs, CLIs, or tools are published. Vanguard engineering operates privately.
      - name: No Public Pricing API
        description: Fund expense ratios, advisory tiers, and brokerage commissions are published as HTML on the investor site; there is no machine-readable pricing API or rate-card endpoint.
      - name: No Public Status Page
        description: No status.vanguard.com / trust.vanguard.com style public status page or incident feed is published; outages are communicated via in-portal banners and customer service channels.
