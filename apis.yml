  - type: BusinessLines
    data:
      - name: Index Mutual Funds
        description: >-
          Vanguard pioneered the retail index mutual fund with the launch of
          the First Index Investment Trust (now the Vanguard 500 Index Fund) in
          1976. Index funds remain a flagship product line and the foundation
          of Vanguard's low-cost, passive investing identity.
        url: https://investor.vanguard.com/investment-products/mutual-funds
      - name: Active Mutual Funds
        description: >-
          Active equity and fixed-income mutual funds managed in-house and by
          sub-advisors, including long-running flagships such as Vanguard
          Wellington and Vanguard Wellesley Income.
        url: https://investor.vanguard.com/investment-products/mutual-funds
      - name: ETFs
        description: >-
          Vanguard is the second-largest ETF provider globally, after
          BlackRock's iShares, with a product family that includes core total-
          market ETFs (VTI, VXUS, BND, BNDX), the Vanguard S&P 500 ETF (VOO),
          ESG ETFs, short-term ETFs, sector and factor strategies, and active
          ETFs. "Build a fully diversified portfolio with our 4 total-market
          ETFs that cover nearly all aspects of the U.S. and international
          stock and bond markets."
        url: https://investor.vanguard.com/investment-products/etfs
      - name: Personal Advisor
        description: >-
          Hybrid robo + human-advisor offering for retail investors with
          tiered services (Vanguard Digital Advisor, Vanguard Personal Advisor,
          Vanguard Personal Advisor Select, Vanguard Personal Advisor Wealth
          Management). One of the largest hybrid-advisory platforms by AUM.
        url: https://investor.vanguard.com/advice
      - name: Retirement Plan Services
        description: >-
          Defined-contribution recordkeeping for plan sponsors (401(k), 403(b),
          457, defined-benefit administration), plus IRAs and rollover support
          for individual participants. Distinct from the institutional
          asset-management business.
        url: https://institutional.vanguard.com
      - name: Institutional Asset Management
        description: >-
          Asset-management mandates for corporate pensions, endowments,
          foundations, healthcare systems, insurance general accounts, and
          sovereigns served through the institutional channel.
        url: https://institutional.vanguard.com
      - name: Fixed Income
        description: >-
          Large in-house fixed-income franchise spanning municipal bonds,
          taxable bonds, money market funds, and bond ETFs (BND, BNDX, BSV,
          BIV, VCIT, VCSH, VTEB, and others).
        url: https://investor.vanguard.com/investment-products/mutual-funds/bond-funds
      - name: Brokerage and Trading
        description: >-
          Self-directed brokerage account for stocks, ETFs (including
          non-Vanguard ETFs), mutual funds, options, and fixed income, with
          Vanguard's online trading platform and the Vanguard mobile app.
        url: https://investor.vanguard.com/investor-resources-education/online-trading
      - name: Financial Advisor Services
        description: >-
          Vanguard Financial Advisor Services (FAS) serves independent and
          broker-dealer-affiliated financial advisors who allocate client
          assets to Vanguard funds and ETFs through the advisors.vanguard.com
          portal.
        url: https://advisors.vanguard.com
