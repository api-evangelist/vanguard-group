name: The Vanguard Group
description: >-
  The Vanguard Group is an American investor-owned asset manager headquartered
  in Malvern, Pennsylvania, and is "the largest provider of mutual funds in the
  world" and the second-largest exchange-traded fund (ETF) provider after
  BlackRock's iShares. Vanguard manages approximately $12 trillion in assets as
  of 2025 and employs roughly 20,000 people (the "crew") as of December 31,
  2024. The firm was founded on May 1, 1975 by John C. ("Jack") Bogle and is
  structured as a mutual: "Vanguard is owned by the funds managed by the
  company and is therefore owned by its customers." Salim Ramji was appointed
  Chief Executive Officer in July 2024. Vanguard's business spans index and
  active mutual funds, ETFs, personal advisor services, retirement plan
  recordkeeping (Vanguard Retirement Plan Services), institutional asset
  management, fixed income, and a financial-advisor channel served through
  Vanguard Financial Advisor Services. Vanguard operates across the Americas,
  Europe, and Asia Pacific. Despite that scale, Vanguard does not publish a
  public developer API program — there is no public OpenAPI specification, no
  SDKs, no CLI, no public webhooks, and no Vanguard-published public RSS feed.
  Investor, advisor, recordkeeping, and distribution-platform integrations are
  delivered through authentication-gated portals (investor.vanguard.com,
  advisors.vanguard.com, institutional.vanguard.com), PDF reporting,
  brokerage/custodian rails, fund-administrator data feeds, and industry
  recordkeeping interfaces.
